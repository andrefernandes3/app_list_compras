<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Preços</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Header e Voltar -->
        <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col md:flex-row gap-4 justify-between items-center border border-gray-200">
            <div class="flex items-center gap-3">
                <a href="index.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-xl text-xs font-bold transition">
                    ⬅️ Voltar
                </a>
                <h1 class="text-2xl font-bold text-gray-800">📊 Histórico de Preços</h1>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="inputEan" placeholder="Digite o EAN ou Nome" class="border border-gray-300 rounded-xl px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button onclick="carregarHistorico()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition">Buscar</button>
            </div>
        </div>

        <!-- Cards de Métricas -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-500">
                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Menor Preço Histórico</span>
                <p id="cardMenorPreco" class="text-2xl font-black text-gray-800 mt-1">R$ --</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Último Preço Registrado</span>
                <p id="cardUltimoPreco" class="text-2xl font-black text-gray-800 mt-1">R$ --</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-purple-500">
                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Média Histórica</span>
                <p id="cardMediaPreco" class="text-2xl font-black text-gray-800 mt-1">R$ --</p>
            </div>
        </div>

        <!-- Container do Gráfico -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <canvas id="graficoPrecos" class="w-full max-h-[400px]"></canvas>
        </div>

    </div>

    <script>
        let meuGrafico = null;

        const coresLojas = {
            'Atacadão': '#e11d48',
            "Sam's Club": '#2563eb'
        };

        // Captura o EAN/Nome vindo do botão da Opção B
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eanParam = urlParams.get('ean');
            const nomeParam = urlParams.get('nome');

            const valorBusca = eanParam || nomeParam;

            if (valorBusca) {
                document.getElementById('inputEan').value = valorBusca;
                carregarHistorico();
            }
        });

        async function carregarHistorico() {
            const termo = document.getElementById('inputEan').value.trim();
            if (!termo) return alert("Digite o EAN ou nome do produto.");

            try {
                const param = /^\d+$/.test(termo) ? `ean=${termo}` : `nome=${encodeURIComponent(termo)}`;
                const resposta = await fetch(`/api/ObterHistorico?${param}`);
                const dados = await resposta.json();

                if (!dados || dados.length === 0) {
                    alert("Nenhum histórico encontrado para este produto.");
                    return;
                }

                atualizarCards(dados);
                renderizarGrafico(dados);

            } catch (erro) {
                console.error("Erro ao carregar histórico:", erro);
                alert("Falha ao consultar a API.");
            }
        }

        function atualizarCards(dados) {
            const precos = dados.map(d => d.preco).filter(p => p > 0);
            if (precos.length === 0) return;

            const menor = Math.min(...precos);
            const ultimo = precos[precos.length - 1];
            const media = precos.reduce((a, b) => a + b, 0) / precos.length;

            document.getElementById('cardMenorPreco').innerText = `R$ ${menor.toFixed(2).replace('.', ',')}`;
            document.getElementById('cardUltimoPreco').innerText = `R$ ${ultimo.toFixed(2).replace('.', ',')}`;
            document.getElementById('cardMediaPreco').innerText = `R$ ${media.toFixed(2).replace('.', ',')}`;
        }

        function renderizarGrafico(dados) {
            const ctx = document.getElementById('graficoPrecos').getContext('2d');

            if (meuGrafico) meuGrafico.destroy();

            const datasUnicas = [...new Set(dados.map(d => new Date(d.data_verificacao).toLocaleDateString('pt-BR')))];
            const lojas = [...new Set(dados.map(d => d.loja))];

            const datasets = lojas.map(loja => {
                const dadosLoja = dados.filter(d => d.loja === loja);
                
                return {
                    label: loja,
                    borderColor: coresLojas[loja] || '#6b7280',
                    backgroundColor: coresLojas[loja] || '#6b7280',
                    fill: false,
                    stepped: true, // Gráfico em degrau (mantém o valor estático até a próxima mudança)
                    data: datasUnicas.map(dataStr => {
                        const registro = dadosLoja.find(d => new Date(d.data_verificacao).toLocaleDateString('pt-BR') === dataStr);
                        return registro ? registro.preco : null;
                    })
                };
            });

            meuGrafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: datasUnicas,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: `Evolução de Preço: ${dados[0].nome}` },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: {
                            title: { display: true, text: 'Preço (R$)' },
                            ticks: { callback: value => 'R$ ' + value.toFixed(2) }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
