<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Minha Lista Inteligente - Zandre</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold">🛒 Minha Lista Inteligente</h1>
    </nav>

    <div class="sticky top-0 z-30 bg-blue-600 p-4 shadow-lg border-b border-blue-700 transition-all">
        <p class="text-[10px] font-black text-blue-200 uppercase text-center tracking-widest">💰 Carrinho / Total Planejado</p>
        <p id="total-real-dinamico" class="text-3xl font-black text-white text-center">R$ 0,00</p>
    </div>

    <div class="flex border-b border-gray-200 bg-white sticky top-[94px] z-20 shadow-sm">
        <button onclick="alternarAba('lista')" id="btn-aba-lista"
            class="flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600">Lista</button>
        <button onclick="alternarAba('dicionario')" id="btn-aba-dict"
            class="flex-1 py-3 text-sm font-bold text-gray-500">Dicionário</button>
        <button onclick="alternarAba('relatorios')" id="btn-aba-rel"
            class="flex-1 py-3 text-sm font-bold text-gray-500">Gastos</button>
    </div>

    <main class="p-4 max-w-md mx-auto">
        
        <div id="secao-lista">
            <button onclick="finalizarCompra()"
                class="w-full mb-4 bg-red-100 text-red-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-transform">
                🗑️ Finalizar Compra e Limpar Lista
            </button>

            <div class="mb-4 bg-blue-50 p-4 rounded-2xl shadow-sm border border-blue-200">
                <h2 class="text-blue-800 font-bold mb-2 flex justify-between italic">
                    📝 Próxima Compra
                    <button onclick="carregarLista()" class="text-[10px] underline">Sincronizar</button>
                </h2>

                <div class="flex flex-wrap gap-2 mb-3">
                    <input type="text" id="novo-item-lista" list="sugestoes-produtos" placeholder="O que falta?"
                        class="flex-[3] min-w-[150px] p-3 text-sm border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                    <datalist id="sugestoes-produtos"></datalist>

                    <div class="flex flex-1 gap-2 min-w-[100px]">
                        <input type="number" id="qtd-item-lista" value="1" min="1"
                            class="w-full p-3 text-sm border border-blue-200 rounded-xl outline-none text-center">
                        <button onclick="adicionarItemManual()"
                            class="bg-blue-600 text-white px-4 rounded-xl font-bold flex items-center justify-center shadow-md active:scale-95">+</button>
                    </div>
                </div>

                <div id="lista-ativa" class="space-y-2 text-sm"></div>

                <div id="totalizador-estimado" class="mt-4 pt-3 border-t border-blue-200 hidden">
                    <p class="text-[10px] font-bold text-blue-800 mb-2 uppercase text-center">Estimativa por Mercado</p>
                    <div id="mercados-soma" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <input type="text" id="url-input" placeholder="Cole a URL da nota aqui..."
                    class="w-full p-2 border rounded-lg text-sm mb-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="processarUrlManual()"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold active:scale-95 transition-transform">Processar Nota</button>
            </div>

            <div id="status" class="mt-4 p-4 rounded-xl hidden text-sm text-center"></div>
            
            <div id="preview-container" class="mt-6 hidden">
                <h3 class="text-gray-700 font-bold mb-2 text-sm">Itens da Nota:</h3>
                <div id="lista-itens" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"></div>
            </div>
        </div>

        <div id="secao-dicionario" class="hidden">
            <div class="flex flex-col gap-2 mb-4 bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                <div class="flex justify-between items-center">
                    <h2 class="text-gray-700 font-bold italic text-sm">Produtos Catalogados</h2>
                    <button id="btn-adicionar-multiplos" onclick="enviarSelecionadosParaLista()"
                        class="hidden bg-green-600 text-white px-3 py-1 rounded-lg text-[10px] font-black shadow-lg">
                        ADICIONAR SELECIONADOS
                    </button>
                </div>
                <label class="flex items-center gap-2 text-[10px] text-gray-500 font-bold cursor-pointer">
                    <input type="checkbox" id="select-all-dict" onchange="selecionarTudoDicionario(this.checked)" class="w-3 h-3">
                    SELECIONAR / DESMARCAR TUDO
                </label>
            </div>
            <div id="lista-dicionario" class="space-y-4"></div>
        </div>

      <div id="secao-relatorios" class="hidden animate-fade-in p-4">
    <div class="mb-4">
        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Filtrar por Unidade:</label>
        <select id="filtro-loja-relatorio" onchange="carregarRelatorios()" 
            class="w-full mt-1 p-3 bg-white border border-gray-200 rounded-2xl text-xs font-bold text-blue-600 outline-none shadow-sm focus:ring-2 focus:ring-blue-400">
            <option value="">📊 TODAS AS UNIDADES</option>
        </select>
    </div>

    <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 mb-4">
        <h3 class="text-center text-gray-400 font-black text-[10px] uppercase tracking-widest mb-6">
            Onde está o seu dinheiro?
        </h3>
        <div class="relative h-[300px]">
            <canvas id="chartCategorias"></canvas>
        </div>
        <div id="lista-gastos-detalhada"></div>
    </div>
</div>    

    </main>

    <script src="script.js"></script>
</body>
</html>
