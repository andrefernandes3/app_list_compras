<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sua Lista de Compras - Osasco</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold">🛒 Minha Lista Inteligente</h1>
    </nav>

    <main class="p-4 max-w-md mx-auto">

        <div class="mb-4 bg-blue-50 p-4 rounded-2xl shadow-sm border border-blue-200">
            <h2 class="text-blue-800 font-bold mb-2 flex justify-between italic">
                📝 Próxima Compra
                <button onclick="carregarLista()" class="text-[10px] underline">Sincronizar</button>
            </h2>

            <div class="relative mb-3">
                <input type="text" id="novo-item-lista" list="sugestoes-produtos" placeholder="O que falta em casa?"
                    class="w-full p-3 text-sm border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                <datalist id="sugestoes-produtos">
                </datalist>
                <button onclick="adicionarItemManual()"
                    class="absolute right-2 top-2 bg-blue-600 text-white w-8 h-8 rounded-lg font-bold">
                    +
                </button>
            </div>

            <div id="lista-ativa" class="space-y-2 text-sm">
                <p class="text-gray-500 italic">Sua lista está vazia.</p>
            </div>

            <div id="totalizador-estimado" class="mt-4 pt-3 border-t border-blue-200 hidden">
                <p class="text-[10px] font-bold text-blue-800 mb-1 uppercase text-center">Estimativa de Gasto Total</p>
                <div id="mercados-soma" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>

        <div class="mb-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-gray-700 font-semibold mb-2 text-sm">Já tem o link? Cole aqui:</h2>
            <div class="flex gap-2">
                <input type="text" id="url-input" placeholder="Cole a URL da nota aqui..."
                    class="flex-1 p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="processarUrlManual()"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold active:scale-95">
                    Ir
                </button>
            </div>
        </div>

        <div id="scanner-container" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-gray-700 font-semibold mb-3">Ou Escaneie por aqui</h2>
            <div id="reader" class="rounded-xl overflow-hidden border-2 border-dashed border-blue-300"></div>
            <input type="file" id="qr-input" accept="image/*" class="hidden">
            <button onclick="document.getElementById('qr-input').click()"
                class="w-full mt-2 bg-gray-200 p-2 rounded-lg text-sm font-semibold">
                📸 Selecionar Foto da Galeria
            </button>
        </div>

        <div id="status" class="mt-4 p-4 rounded-xl hidden"></div>

        <div id="preview-container" class="mt-6 hidden">
            <div id="lista-itens"></div>
        </div>
    </main>

    <script>
        let html5QrcodeScanner = null;
        let scannerAtivo = false;

        function iniciarScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(console.warn);
            }
            html5QrcodeScanner = new Html5QrcodeScanner("reader", {
                fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0
            });
            html5QrcodeScanner.render(onScanSuccess);
            scannerAtivo = true;
        }

        function processarUrl(url) {
            if (html5QrcodeScanner && scannerAtivo) {
                html5QrcodeScanner.clear();
                scannerAtivo = false;
            }

            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('hidden');
            statusDiv.className = "mt-4 p-4 rounded-xl bg-blue-100 text-blue-700";
            statusDiv.innerText = "📡 Processando nota fiscal... aguarde.";

            fetch('/api/ProcessarNota', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    statusDiv.className = "mt-4 p-4 rounded-xl bg-green-100 text-green-700";
                    statusDiv.innerText = "✅ Nota lida com sucesso!";
                    renderPreview(data.dados);
                })
                .catch(err => {
                    statusDiv.className = "mt-4 p-4 rounded-xl bg-red-100 text-red-700";
                    statusDiv.innerText = "❌ Erro: " + err.message;
                    setTimeout(() => { if (!scannerAtivo) iniciarScanner(); }, 2000);
                });
        }

        function processarUrlManual() {
            const input = document.getElementById('url-input');
            const url = input.value.trim();
            if (url.startsWith('http')) {
                processarUrl(url);
                input.value = '';
            } else {
                alert("Por favor, cole uma URL válida.");
            }
        }

        function onScanSuccess(decodedText) {
            if (decodedText && decodedText.startsWith('http')) {
                processarUrl(decodedText);
            }
        }

        function renderPreview(dados) {
            const previewContainer = document.getElementById('preview-container');
            const listaItens = document.getElementById('lista-itens');
            if (!listaItens) return;

            listaItens.innerHTML = '';
            previewContainer.classList.remove('hidden');

            const totalExibicao = dados.valor_total || 0;
            const header = document.createElement('div');
            header.className = "mb-4 p-3 bg-blue-50 rounded-lg border border-blue-100";
            header.innerHTML = `
        <p class="text-sm font-bold text-blue-800">${dados.estabelecimento || "Estabelecimento"}</p>
        <p class="text-xs text-blue-600 font-bold text-lg">Total: R$ ${parseFloat(totalExibicao).toFixed(2)}</p>
    `;
            listaItens.appendChild(header);

            if (dados.itens && dados.itens.length > 0) {
                dados.itens.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "flex flex-col p-3 bg-white border-b border-gray-100";
                    itemDiv.innerHTML = `
                <div class="flex justify-between items-start w-full">
                    <div class="flex-1">
                        <p class="text-sm font-medium text-gray-800">${escapeHtml(item.descricao)}</p>
                        <p class="text-[10px] text-gray-400">ID: ${item.id_interno} | Qtd: ${item.quantidade}</p> 
                        <div class="info-comparativo"></div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-sm font-bold text-blue-700">R$ ${item.preco_unitario.toFixed(2)}</p>
                            <p class="text-[10px] text-gray-400">Total: R$ ${item.preco_total.toFixed(2)}</p>
                        </div>
                        <button onclick="vincularID('${item.id_interno}', '${escapeHtml(item.descricao)}')" 
                            class="p-2 bg-gray-100 rounded-full hover:bg-blue-100 transition-colors">🔗</button>
                    </div>
                </div>
            `;
                    listaItens.appendChild(itemDiv);
                    const compDiv = itemDiv.querySelector('.info-comparativo');
                    buscarComparativo(item.descricao, compDiv);
                });
            }
        }

        async function buscarComparativo(nomeProduto, elementoDestino) {
            try {
                const response = await fetch(`/api/CompararPrecos?nome=${encodeURIComponent(nomeProduto)}`);
                if (!response.ok) return;
                const dados = await response.json();
                if (dados.length > 0) {
                    const melhor = dados[0];
                    elementoDestino.innerHTML = `
                <div class="mt-1 text-[10px] bg-green-50 text-green-700 p-1 rounded border border-green-100">
                    💡 Melhor preço: R$ ${melhor.menorPreco.toFixed(2)} no ${melhor._id.split(' ')[0]}
                </div>`;
                }
            } catch (err) { console.error(err); }
        }

        function vincularID(id, desc) {
            const novoNome = prompt(`Confirmar nome para a lista de compras:`, desc);
            if (novoNome) {
                fetch('/api/VincularProdutos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idPrincipal: id, nomePadrao: novoNome.trim().toUpperCase() })
                }).then(() => {
                    return fetch('/api/GerenciarLista', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nome: novoNome.trim().toUpperCase() })
                    });
                }).then(() => {
                    alert("Produto vinculado e adicionado à sua lista!");
                    carregarLista();
                }).catch(err => alert("Erro: " + err.message));
            }
        }

        function escapeHtml(text) {
            return text ? text.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) : '';
        }

        // ========== FUNÇÕES GLOBAIS DA LISTA DE COMPRAS ==========
        async function adicionarItemManual() {
            const input = document.getElementById('novo-item-lista');
            const nome = input.value.trim();
            if (!nome) return;
            try {
                const response = await fetch('/api/GerenciarLista', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome.toUpperCase() })
                });
                if (response.ok) {
                    input.value = '';
                    carregarLista();
                } else {
                    alert("Erro ao adicionar item.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 1. Busca os nomes que você já vinculou para sugerir no input
        async function carregarSugestoes() {
            try {
                const response = await fetch('/api/VincularProdutos'); // Reaproveitamos a rota de vínculos
                const produtos = await response.json();
                const datalist = document.getElementById('sugestoes-produtos');

                // Pega apenas os nomes únicos do dicionário
                const nomesUnicos = [...new Set(produtos.map(p => p.nomePadrao))];
                datalist.innerHTML = nomesUnicos.map(nome => `<option value="${nome}">`).join('');
            } catch (e) { console.error("Erro sugestões:", e); }
        }

        // 2. Corrigindo o feedback visual de "Comprado"
        async function marcarComoComprado(nome) {
            const itemEstilo = document.getElementById(`item-nome-${nome.replace(/\s+/g, '-')}`);
            if (itemEstilo) {
                itemEstilo.classList.add('line-through', 'text-gray-400');
            }

            try {
                // Aqui chamamos a API para mudar o status no MongoDB
                await fetch('/api/GerenciarLista', {
                    method: 'PATCH', // Ou POST com um campo 'acao: concluir'
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome, comprado: true })
                });

                setTimeout(carregarLista, 1000); // Recarrega após 1 segundo para limpar a tela
            } catch (e) { alert("Erro ao baixar item"); }
        }

        // 3. Atualizando a renderização da lista com ID para o estilo
        async function carregarLista() {
            const listaDiv = document.getElementById('lista-ativa');
            listaDiv.innerHTML = '<p class="text-gray-400 text-xs text-center animate-pulse">Atualizando preços...</p>';

            try {
                const response = await fetch('/api/GerenciarLista');
                const itens = await response.json();

                if (itens.length === 0) {
                    listaDiv.innerHTML = '<p class="text-gray-500 italic text-center">Tudo pronto!</p>';
                    document.getElementById('totalizador-estimado').classList.add('hidden');
                    return;
                }

                listaDiv.innerHTML = '';
                document.getElementById('totalizador-estimado').classList.remove('hidden');

                itens.forEach(item => {
                    const idFormatado = item.item_nome.replace(/\s+/g, '-');
                    const itemElement = document.createElement('div');
                    itemElement.className = "flex flex-col bg-white p-3 rounded-xl border border-blue-50 shadow-sm";
                    itemElement.innerHTML = `
                <div class="flex justify-between items-center">
                    <span id="item-nome-${idFormatado}" class="font-bold text-gray-700">${item.item_nome}</span>
                    <button onclick="marcarComoComprado('${item.item_nome}')" class="text-xl">✅</button>
                </div>
                <div id="preco-lista-${idFormatado}" class="text-[10px] text-blue-500 mt-1 font-medium">Buscando economia...</div>
            `;
                    listaDiv.appendChild(itemElement);

                    // Chama o comparativo que já temos
                    buscarComparativo(item.item_nome, document.getElementById(`preco-lista-${idFormatado}`));
                });
            } catch (err) { console.error(err); }
        }

        // Inicia tudo
        carregarSugestoes();
        carregarLista();

        // Inicialização
        carregarLista();
        iniciarScanner();
    </script>
</body>

</html>
