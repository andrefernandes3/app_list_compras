<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Minha Lista Inteligente - Osasco</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <h1 class="text-xl font-bold">🛒 Minha Lista Inteligente</h1>
    </nav>

    <div class="flex border-b border-gray-200 bg-white sticky top-0 z-10">
        <button onclick="alternarAba('lista')" id="btn-aba-lista"
            class="flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600">Lista</button>
        <button onclick="alternarAba('dicionario')" id="btn-aba-dict"
            class="flex-1 py-3 text-sm font-bold text-gray-500">Dicionário</button>
    </div>

    <main class="p-4 max-w-md mx-auto">

        <div id="secao-lista">
            <div class="mb-4 bg-blue-50 p-4 rounded-2xl shadow-sm border border-blue-200">
                <h2 class="text-blue-800 font-bold mb-2 flex justify-between italic">
                    📝 Próxima Compra
                    <button onclick="carregarLista()" class="text-[10px] underline">Sincronizar</button>
                </h2>

                <div class="relative mb-3">
                    <input type="text" id="novo-item-lista" list="sugestoes-produtos" placeholder="O que falta em casa?"
                        class="w-full p-3 text-sm border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                    <datalist id="sugestoes-produtos"></datalist>
                    <button onclick="adicionarItemManual()"
                        class="absolute right-2 top-2 bg-blue-600 text-white w-8 h-8 rounded-lg font-bold">+</button>
                </div>

                <div id="lista-ativa" class="space-y-2 text-sm"></div>

                <div id="totalizador-estimado" class="mt-4 pt-3 border-t border-blue-200 hidden">
                    <p class="text-[10px] font-bold text-blue-800 mb-2 uppercase text-center">Estimativa de Gasto Total
                    </p>
                    <div id="mercados-soma" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                    <input type="text" id="url-input" placeholder="Cole a URL da nota aqui..."
                        class="w-full p-2 border rounded-lg text-sm mb-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="processarUrlManual()"
                        class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold active:scale-95 transition-transform">Processar
                        Nota</button>
                </div>

                <div id="reader" class="rounded-xl overflow-hidden border-2 border-dashed border-blue-200"></div>
            </div>

            <div id="status" class="mt-4 p-4 rounded-xl hidden text-sm"></div>
            <div id="preview-container" class="mt-6 hidden">
                <h3 class="text-gray-700 font-bold mb-2 text-sm">Itens da Nota:</h3>
                <div id="lista-itens" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                </div>
            </div>
        </div>

        <div id="secao-dicionario" class="hidden">
            <h2 class="text-gray-700 font-bold mb-4 italic">Produtos Catalogados</h2>
            <div id="lista-dicionario" class="space-y-4"></div>
        </div>

    </main>

    <script>
        let html5QrcodeScanner = null;
        let totaisPorMercado = {};

        // --- NAVEGAÇÃO ---
        function alternarAba(aba) {
            const isLista = aba === 'lista';
            document.getElementById('secao-lista').classList.toggle('hidden', !isLista);
            document.getElementById('secao-dicionario').classList.toggle('hidden', isLista);
            document.getElementById('btn-aba-lista').className = isLista ? "flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600" : "flex-1 py-3 text-sm font-bold text-gray-500";
            document.getElementById('btn-aba-dict').className = !isLista ? "flex-1 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600" : "flex-1 py-3 text-sm font-bold text-gray-500";
            if (!isLista) renderizarDicionario();
        }

        // --- LISTA DE COMPRAS ---
        async function carregarLista() {
            totaisPorMercado = {};
            const listaDiv = document.getElementById('lista-ativa');
            listaDiv.innerHTML = '<p class="text-gray-400 text-xs text-center animate-pulse">Sincronizando...</p>';

            try {
                const response = await fetch('/api/GerenciarLista');
                const itens = await response.json();
                if (itens.length === 0) {
                    listaDiv.innerHTML = '<p class="text-gray-500 italic text-center py-4">Tudo comprado! 🎉</p>';
                    document.getElementById('totalizador-estimado').classList.add('hidden');
                    return;
                }
                listaDiv.innerHTML = '';
                itens.forEach(item => {
                    const idFormatado = item.item_nome.replace(/\s+/g, '-');
                    const itemElement = document.createElement('div');
                    itemElement.className = "bg-white p-3 rounded-xl border border-blue-50 shadow-sm mb-2";
                    itemElement.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span id="item-nome-${idFormatado}" class="font-bold text-gray-700 uppercase text-[11px]">${item.item_nome}</span>
                            <button onclick="marcarComoComprado('${item.item_nome}')" class="text-lg">✅</button>
                        </div>
                        <div id="preco-lista-${idFormatado}"></div>
                    `;
                    listaDiv.appendChild(itemElement);
                    buscarComparativo(item.item_nome, document.getElementById(`preco-lista-${idFormatado}`));
                });
                carregarSugestoes();
            } catch (err) { console.error(err); }
        }

        async function buscarComparativo(nomeProduto, elementoDestino) {
            try {
                const response = await fetch(`/api/CompararPrecos?nome=${encodeURIComponent(nomeProduto)}`);
                if (!response.ok) return;
                const dados = await response.json();
                if (dados.length > 0) {
                    const melhor = dados[0];
                    const mercado = melhor._id.split(' ')[0];
                    if (!totaisPorMercado[mercado]) totaisPorMercado[mercado] = 0;
                    totaisPorMercado[mercado] += melhor.menorPreco;
                    elementoDestino.innerHTML = `<div class="mt-1 text-[10px] bg-green-50 text-green-700 p-1 px-2 rounded-lg border border-green-100 flex justify-between"><span>💡 ${mercado}</span><span>R$ ${melhor.menorPreco.toFixed(2)}</span></div>`;
                    atualizarSomaVisual();
                } else {
                    elementoDestino.innerHTML = `<div class="text-[9px] text-gray-400 italic">🔍 Sem histórico de preço</div>`;
                }
            } catch (e) { }
        }

        function atualizarSomaVisual() {
            const container = document.getElementById('mercados-soma');
            document.getElementById('totalizador-estimado').classList.remove('hidden');
            container.innerHTML = '';
            Object.entries(totaisPorMercado).sort((a, b) => a[1] - b[1]).forEach(([m, v], i) => {
                const cor = i === 0 ? 'bg-green-100 border-green-200 text-green-700' : 'bg-gray-50 border-gray-200 text-gray-500';
                container.innerHTML += `<div class="p-2 rounded-lg border ${cor} text-center shadow-sm"><p class="text-[8px] uppercase">${m}</p><p class="text-xs font-bold">R$ ${v.toFixed(2)}</p></div>`;
            });
        }

        async function marcarComoComprado(nome) {
            const idFormatado = nome.replace(/\s+/g, '-');
            const span = document.getElementById(`item-nome-${idFormatado}`);
            if (span) span.classList.add('line-through', 'text-gray-400');

            try {
                await fetch('/api/GerenciarLista', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    // Garantimos que o nome vai em maiúsculas para o MongoDB encontrar o registro
                    body: JSON.stringify({ nome: nome.toUpperCase(), comprado: true })
                });
                // O tempo de 500ms é para você ver o efeito de "riscado" antes de sumir
                setTimeout(carregarLista, 500);
            } catch (e) { console.error("Erro ao marcar como comprado:", e); }
        }

        async function adicionarItemManual() {
            const input = document.getElementById('novo-item-lista');
            const nome = input.value.trim().toUpperCase();
            if (!nome) return;
            await fetch('/api/GerenciarLista', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: nome })
            });
            input.value = '';
            carregarLista();
        }

        async function carregarSugestoes() {
            try {
                const response = await fetch('/api/VincularProdutos');
                const produtos = await response.json();
                const datalist = document.getElementById('sugestoes-produtos');
                const nomesUnicos = [...new Set(produtos.map(p => p.nome_comum))];
                datalist.innerHTML = nomesUnicos.map(n => `<option value="${n.toUpperCase()}">`).join('');
            } catch (e) { }
        }

        // --- DICIONÁRIO ---
        async function renderizarDicionario() {
            const container = document.getElementById('lista-dicionario');
            container.innerHTML = '<p class="text-center text-gray-400 animate-pulse">Carregando categorias...</p>';
            try {
                const response = await fetch('/api/VincularProdutos');
                const produtos = await response.json();
                const categorias = {};
                produtos.forEach(p => {
                    const cat = p.categoria || "OUTROS";
                    if (!categorias[cat]) categorias[cat] = [];
                    categorias[cat].push(p);
                });
                container.innerHTML = '';
                for (const [cat, itens] of Object.entries(categorias)) {
                    const div = document.createElement('div');
                    div.className = "mb-4";
                    div.innerHTML = `<h3 class="text-[10px] font-black text-blue-500 mb-2 uppercase tracking-widest">${cat}</h3>`;
                    itens.forEach(prod => {
                        div.innerHTML += `
                            <div class="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center mb-1 shadow-sm">
                                <div class="flex-1"><p class="text-xs font-bold text-gray-800 uppercase">${prod.nome_comum}</p></div>
                                <button onclick="adicionarDiretoALista('${prod.nome_comum}')" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-xs font-bold">🛒+</button>
                            </div>`;
                    });
                    container.appendChild(div);
                }
            } catch (e) { container.innerHTML = "Erro ao carregar dicionário."; }
        }

        async function adicionarDiretoALista(nome) {
            await fetch('/api/GerenciarLista', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: nome.toUpperCase() })
            });
            alert(`${nome} adicionado!`);
            carregarLista();
        }

        // --- PROCESSAMENTO DE NOTA (WMS/CARREFOUR) ---
        function processarUrlManual() {
            const input = document.getElementById('url-input');
            const url = input.value.trim();
            if (url.startsWith('http')) {
                processarUrl(url);
                input.value = '';
            } else {
                alert("Por favor, cole uma URL válida da nota fiscal.");
            }
        }

        function processarUrl(url) {
            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('hidden');
            statusDiv.className = "mt-4 p-4 rounded-xl bg-blue-100 text-blue-700 text-sm";
            statusDiv.innerText = "📡 Processando nota do mercado... aguarde.";

            fetch('/api/ProcessarNota', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
                .then(r => r.json())
                .then(data => {
                    statusDiv.className = "mt-4 p-4 rounded-xl bg-green-100 text-green-700 text-sm";
                    statusDiv.innerText = "✅ Nota lida com sucesso!";
                    renderPreview(data.dados);
                })
                .catch(err => {
                    statusDiv.className = "mt-4 p-4 rounded-xl bg-red-100 text-red-700 text-sm";
                    statusDiv.innerText = "❌ Erro ao ler nota.";
                });
        }

        function renderPreview(dados) {
            const previewContainer = document.getElementById('preview-container');
            const listaItens = document.getElementById('lista-itens');
            listaItens.innerHTML = '';
            previewContainer.classList.remove('hidden');

            const header = document.createElement('div');
            header.className = "p-3 bg-gray-50 border-b border-gray-200";
            header.innerHTML = `
                <p class="text-[10px] font-bold text-gray-500 uppercase">${dados.estabelecimento || "MERCADO"}</p>
                <p class="text-sm font-black text-blue-600">Total: R$ ${parseFloat(dados.valor_total || 0).toFixed(2)}</p>
            `;
            listaItens.appendChild(header);

            dados.itens.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "flex justify-between items-center p-3 border-b border-gray-100 last:border-0";
                itemDiv.innerHTML = `
                    <div class="flex-1">
                        <p class="text-[11px] font-bold text-gray-800 uppercase">${escapeHtml(item.descricao)}</p>
                        <p class="text-[9px] text-gray-400">ID: ${item.id_interno} | R$ ${item.preco_unitario.toFixed(2)}</p>
                    </div>
                    <button onclick="vincularID('${item.id_interno}', '${escapeHtml(item.descricao)}')" 
                        class="ml-2 p-2 bg-blue-50 text-blue-600 rounded-full">🔗</button>
                `;
                listaItens.appendChild(itemDiv);
            });
        }

        function vincularID(id, desc) {
            const novoNome = prompt(`Nome padrão para "${desc}":`, desc);
            if (!novoNome) return;
            const categoria = prompt(`Categoria (ex: PADARIA, FRIOS, LIMPEZA):`, "OUTROS");
            fetch('/api/VincularProdutos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    idPrincipal: id,
                    nomePadrao: novoNome.trim().toUpperCase(),
                    categoria: categoria.trim().toUpperCase()
                })
            }).then(() => {
                alert("Vinculado!");
                carregarLista();
            });
        }

        function escapeHtml(t) { return t ? t.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])) : ''; }

        carregarLista();
    </script>
</body>

</html>
