
name: ⏰ Despertador do Robô de Preços

on:
  schedule:
    # 11:00 no servidor do GitHub = 08:00 no Brasil. Roda todos os dias.
    - cron: '0 11 * * *'
  
  workflow_dispatch:

jobs:
  acordar-robo:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 1. Iniciar Varredura de Preços (Sam's, Carrefour, Atacadão)
        run: curl -s -X GET "https://delightful-pond-0b98bde1e.1.azurestaticapps.net/api/MonitorarPrecos"
        
      - name: 📧 2. Disparar E-mails com Alertas (Zoho)
        run: curl -s -X GET "https://delightful-pond-0b98bde1e.1.azurestaticapps.net/api/DispararAlertas"
